<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPD</title>
    <link id="css-link" rel="stylesheet" href="static/css/styles.css">
    <script src="static/js/script.js"></script>
</head>
<body>
    <nav class="top-nav">
        <ul>
            <li><a href="./">Home</a></li>
            <li><a href="datasets">Datasets</a></li>
        </ul>
    </nav>

    <div class="container home-layout">
        <aside class="sidebar">
            <section class="filter-container">
                <h3>Search</h3>
                <form id="search-form">
                    <input type="text" id="keywords" name="keywords" placeholder="Enter keywords / arXiv ID">
                    <input type="hidden" id="data_type" name="data_type" value="All">
                    <input type="hidden" id="task" name="task" value="All">
                    <div class="search-actions">
                        <button type="submit">Search</button>
                        <button type="button" id="reset-filters">Reset</button>
                    </div>
                </form>
                <button type="button" id="toggle-advanced" class="secondary-btn" aria-expanded="false">
                    Advanced Search
                </button>
                <div id="advanced-search-panel" class="advanced-panel" hidden>
                    <div class="advanced-toolbar">
                        <label for="condition-logic">Condition Logic</label>
                        <select id="condition-logic">
                            <option value="and" selected>AND</option>
                            <option value="or">OR</option>
                        </select>
                    </div>
                    <div id="advanced-conditions"></div>
                    <button type="button" id="add-condition" class="secondary-btn">+ Add Condition</button>
                    <div class="advanced-sort">
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by">
                            <option value="title" selected>Title</option>
                            <option value="arxiv_id">arXiv ID</option>
                            <option value="dataset_name">Dataset Name</option>
                            <option value="dataset_entity">Dataset Entity</option>
                            <option value="task">Task</option>
                            <option value="data_type">Data Type</option>
                            <option value="scale">Scale</option>
                            <option value="location">Location</option>
                        </select>
                        <label for="sort-order">Order</label>
                        <select id="sort-order">
                            <option value="asc" selected>Ascending</option>
                            <option value="desc">Descending</option>
                        </select>
                    </div>
                    <label class="inline-checkbox">
                        <input type="checkbox" id="include-stats" checked>
                        Include result statistics
                    </label>
                </div>
            </section>

            <section class="filter-container" id="data-type-filter">
                <h3>Filter by Data Type</h3>
                <a href="#" data-type="All" class="filter-link active">All</a>
            </section>

            <section class="filter-container" id="task-filter">
                <h3>Filter by Task</h3>
                <a href="#" data-task="All" class="filter-link active">All</a>
            </section>
        </aside>

        <main class="results">
            <section id="data-status" class="data-status">
                <div id="data-status-text">数据状态加载中...</div>
                <div>
                    <button id="refresh-data-status" type="button">刷新数据状态</button>
                </div>
            </section>

            <section id="search-stats" class="result-stats" aria-live="polite"></section>
            <h3 id="results-count">Search Results: 0 total items (0 items on this page)</h3>
            <div id="results-list">
                <p>No results found.</p>
            </div>
            <div class="pagination-container">
                <div class="pagination">
                    <button id="prev-page" disabled>&laquo; Previous</button>
                    <select id="page-selector" aria-label="Select page"></select>
                    <button id="next-page" disabled>Next &raquo;</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
