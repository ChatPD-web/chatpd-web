<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ChatPD provides simple search and browsing for dataset usage in academic papers.">
    <title>ChatPD</title>
    <link id="css-link" rel="stylesheet" href="static/css/styles.css">
    <script src="static/js/script.js"></script>
</head>
<body>
    <nav class="top-nav">
        <ul>
            <li><a href="./">Home</a></li>
            <li><a href="datasets">Datasets</a></li>
        </ul>
    </nav>

    <div class="container home-layout">
        <aside class="sidebar">
            <section class="filter-container">
                <h3>Search</h3>
                <form id="search-form">
                    <input type="text" id="keywords" name="keywords" placeholder="Enter keywords / arXiv ID">
                    <div class="simple-controls">
                        <div class="control-field">
                            <label for="sort-by">Sort by</label>
                            <select id="sort-by" name="sort_by">
                                <option value="latest" selected>Latest</option>
                                <option value="earliest">Earliest</option>
                            </select>
                        </div>
                        <div class="control-field">
                            <label for="arxiv-from">From</label>
                            <input type="text" id="arxiv-from" name="arxiv_from" placeholder="YYMM (e.g. 2506)" maxlength="4" inputmode="numeric">
                        </div>
                        <div class="control-field">
                            <label for="arxiv-to">To</label>
                            <input type="text" id="arxiv-to" name="arxiv_to" placeholder="YYMM (e.g. 2508)" maxlength="4" inputmode="numeric">
                        </div>
                    </div>
                    <div class="search-actions">
                        <button type="submit">Search</button>
                        <button type="button" id="reset-filters">Reset</button>
                    </div>
                </form>
            </section>

            <section class="filter-container" id="data-type-filter">
                <h3>Filter by Data Type</h3>
                <a href="#" data-type="All" class="filter-link active">All</a>
            </section>

            <section class="filter-container" id="task-filter">
                <h3>Filter by Task</h3>
                <a href="#" data-task="All" class="filter-link active">All</a>
            </section>
        </aside>

        <main class="results">
            <section id="data-status" class="data-status">
                <div id="data-status-text">Data status loading...</div>
                <div>
                    <button id="refresh-data-status" type="button">Refresh Status</button>
                </div>
            </section>

            <h3 id="results-count">Search Results: 0 total items (0 items on this page)</h3>
            <div id="results-list">
                <p>No results found.</p>
            </div>
            <div class="pagination-container">
                <div class="pagination">
                    <button id="prev-page" disabled>&laquo; Previous</button>
                    <span id="page-info" aria-live="polite">Page 1 / 1</span>
                    <button id="next-page" disabled>Next &raquo;</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
