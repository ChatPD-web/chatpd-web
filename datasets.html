<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse dataset entities and usage counts in ChatPD.">
    <meta name="chatpd-api-base" content="https://testweb.241814.xyz">
    <meta name="note-for-ai-agents" content="This page loads data via REST API. Do not scrape HTML. Use API: https://testweb.241814.xyz/api/datasets — see api-config.json or llms.txt for full guide.">
    <link rel="alternate" type="application/json" href="api-config.json" title="ChatPD API config">
    <link rel="alternate" type="text/plain" href="llms.txt" title="ChatPD AI agent guide">
    <title>ChatPD - Datasets</title>
    <link id="css-link" rel="stylesheet" href="static/css/styles.css">
</head>
<body>
    <nav class="top-nav">
        <ul>
            <li><a href="./">Home</a></li>
            <li><a href="datasets">Datasets</a></li>
            <li><a href="api.html">API</a></li>
        </ul>
    </nav>

    <!-- FOR AI AGENTS: This page has no data in its HTML. All data is loaded via JavaScript from a REST API.
         To list datasets, call: GET https://testweb.241814.xyz/api/datasets?page=1&per_page=24&search=KEYWORD
         Full guide: https://chatpd-web.github.io/chatpd-web/llms.txt
    -->
    <div class="container datasets-container">
        <h1>Dataset Collections</h1>
        <p class="description">Browse available datasets and quickly jump to usage details.</p>
        
        <!-- 数据集搜索 -->
        <div class="dataset-search">
            <input type="text" id="dataset-search-input" placeholder="Search by dataset name/entity">
        </div>
        
        <!-- 数据集列表 -->
        <div class="dataset-list" id="dataset-list">
            <div class="loading">Loading datasets...</div>
        </div>

        <!-- 分页控件 -->
        <div class="pagination-container">
            <div class="pagination" id="pagination">
                <button id="prev-page" disabled>&laquo; Previous</button>
                <select id="page-selector" aria-label="Select page"></select>
                <button id="next-page" disabled>Next &raquo;</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get base URL for API calls
            const getBaseUrl = () => {
                const path = window.location.pathname;
                if (path.includes('/chatpd-web/')) {
                    // GitHub Pages deployment
                    return '/chatpd-web';
                }
                // Local development
                return '';
            };
            
            const baseUrl = getBaseUrl();
            
            // Get API URL - use remote server when on GitHub Pages
            const getApiUrl = () => {
                const hostname = window.location.hostname;
                if (hostname === 'chatpd-web.github.io' || hostname.includes('github.io')) {
                    // When on GitHub Pages, use the remote API server
                    return 'https://testweb.241814.xyz';
                }
                // Local development - use relative paths
                return '';
            };
            
            const apiUrl = getApiUrl();
            
            // Update navigation links if needed
            document.querySelectorAll('.top-nav a').forEach(link => {
                if (link.getAttribute('href') === './') {
                    link.setAttribute('href', baseUrl + '/' || './');
                } else if (link.getAttribute('href') === 'datasets') {
                    link.setAttribute('href', baseUrl + '/datasets');
                } else if (link.getAttribute('href') === 'api.html') {
                    link.setAttribute('href', baseUrl + '/api.html');
                }
            });
            
            // Update CSS link path if needed
            const cssLink = document.getElementById('css-link');
            if (baseUrl && cssLink) {
                cssLink.href = `${baseUrl}/static/css/styles.css`;
            }

            const datasetList = document.getElementById('dataset-list');
            const searchInput = document.getElementById('dataset-search-input');
            const prevButton = document.getElementById('prev-page');
            const nextButton = document.getElementById('next-page');
            const pageSelector = document.getElementById('page-selector');
            let currentPage = 1;
            let totalPages = 1;
            let allDatasets = [];
            const perPage = 24;
            let currentSearch = "";

            // 加载数据集
            function loadDatasets(page = 1) {
                datasetList.innerHTML = '<div class="loading">Loading datasets...</div>';
                const params = new URLSearchParams({
                    page: String(page),
                    per_page: String(perPage),
                });
                if (currentSearch) {
                    params.set('search', currentSearch);
                }
                fetch(`${apiUrl}/api/datasets?${params.toString()}`)
                    .then(response => response.json())
                    .then(data => {
                        allDatasets = data.datasets;
                        totalPages = data.total_pages;
                        currentPage = data.current_page;
                        displayDatasets(allDatasets);
                        updatePagination();
                        populatePageSelector();
                    })
                    .catch(error => {
                        console.error('Error fetching datasets:', error);
                        datasetList.innerHTML = '<div class="error">Failed to load datasets. Please try again later.</div>';
                    });
            }

            // 更新分页按钮状态
            function updatePagination() {
                prevButton.disabled = currentPage === 1;
                nextButton.disabled = currentPage === totalPages;
            }

            // 填充页码选择器
            function populatePageSelector() {
                pageSelector.innerHTML = '';
                for (let i = 1; i <= totalPages; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Page ${i} of ${totalPages}`;
                    if (i === currentPage) {
                        option.selected = true;
                    }
                    pageSelector.appendChild(option);
                }
            }

            // 分页按钮事件
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    loadDatasets(currentPage - 1);
                }
            });

            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    loadDatasets(currentPage + 1);
                }
            });

            // 页码选择器事件
            pageSelector.addEventListener('change', function() {
                currentPage = parseInt(this.value);
                loadDatasets(currentPage);
            });

            // 搜索功能
            function debounce(func, wait) {
                let timeoutId;
                return (...args) => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => func(...args), wait);
                };
            }

            searchInput.addEventListener('input', debounce(() => {
                currentSearch = searchInput.value.trim().toLowerCase();
                loadDatasets(1);
            }, 250));

            function escapeHtml(text) {
                return (text ?? '')
                    .toString()
                    .replaceAll('&', '&amp;')
                    .replaceAll('<', '&lt;')
                    .replaceAll('>', '&gt;')
                    .replaceAll('"', '&quot;')
                    .replaceAll("'", '&#039;');
            }

            // 显示数据集列表
            function displayDatasets(datasets) {
                if (!datasets || datasets.length === 0) {
                    datasetList.innerHTML = '<div class="no-results">No datasets found.</div>';
                    return;
                }

                datasetList.innerHTML = '';
                datasets.forEach(dataset => {
                    if (!dataset.dataset_entity) return;
                    
                    const card = document.createElement('div');
                    card.className = 'dataset-card';
                    
                    // Always use baseUrl for internal navigation
                    const datasetUrl = `${baseUrl}/dataset/${encodeURIComponent(dataset.dataset_entity)}`;
                    
                    card.innerHTML = `
                        <h3>
                            <a href="${datasetUrl}">${escapeHtml(dataset.dataset_entity)}</a>
                        </h3>
                        <div class="dataset-meta">
                            <span class="usage-count">Used in ${Number(dataset.usage_count || 0)} paper(s)</span>
                        </div>
                    `;
                    
                    datasetList.appendChild(card);
                });
            }

            // 初始加载
            loadDatasets();
        });
    </script>
</body>
</html>
